<script>

// CLIENT CONFIG

const CLIENTS = [
  { label: "WinStar",        code: "ws"    },
  { label: "Riverwind",      code: "rw"    },
  { label: "Newcastle",      code: "nc"    },
  { label: "Goldsby Gaming", code: "ggc"   },
  { label: "Quvia",          code: "quvia" }
];

// (rest of your config stays EXACTLY the same)

// ─────────────────────────────────────────────
// NEW: dynamic artist endpoint
// ─────────────────────────────────────────────
function getArtistEndpoint() {
  if (en.clientCode === "ws") {
    return "https://script.google.com/macros/s/AKfycbxG2_S7Q0uyow0_25nOt8cleBkWTlwpJ9XJDpXoXIhuN69mbhsxpHVx0redJjmWMxg9Tg/exec?callback=handleArtists";
  }
  if (en.clientCode === "rw") {
    return "https://script.google.com/macros/s/AKfycbxUshCx5hj5Chj_nsalvL7f1rNqw26HhPuVnwj4k_Duq0LJJxsZ0Wlft5p_SJS7I6Hf/exec?callback=handleArtists";
  }
  return null;
}

// ─────────────────────────────────────────────
// UPDATED: load artists dynamically
// ─────────────────────────────────────────────
function loadArtists() {
  var endpoint = getArtistEndpoint();
  if (!endpoint) return;

  // clear old list so dropdown doesn't show stale data
  artistList = [];

  var script = document.createElement("script");
  script.src = endpoint;
  document.body.appendChild(script);
}

// ─────────────────────────────────────────────
// EXISTING CODE (unchanged except one addition)
// ─────────────────────────────────────────────
CLIENTS.forEach(function(c) {
  var btn = document.createElement("button");
  btn.className = "preset-btn client-btn";
  btn.textContent = c.label;
  btn.onclick = function() {
    setActive("client-btns", btn);
    en.client = c.label;
    en.clientCode = c.code;
    en.driver = ""; en.driverConfig = null;
    en.emailType = ""; en.content = ""; en.desc = ""; en.type2 = "";
    renderDriverBtns(c.code);
    renderEmailTypeBtns();
    document.getElementById("en-content-btns").innerHTML = '<span class="empty-hint">Select a business driver first</span>';
    document.getElementById("en-desc-btns").innerHTML = '<span class="empty-hint">Select a business driver first</span>';
    document.getElementById("type2-section").style.display = "none";
    document.getElementById("type2-btns").innerHTML = "";
    buildEmailName();

    loadArtists(); // 👈 THIS IS THE KEY ADD
  };
  document.getElementById("client-btns").appendChild(btn);
});

})();
